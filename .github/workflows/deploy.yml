# Build & push image to GHCR, then pull + up on VPS (Docker Compose).
# Secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_APP_DIR; optional VPS_PORT (default 22).
# См. web/README.md — раздел «Деплой в production: Docker…»

name: Deploy (Docker → GHCR → VPS)

on:
  push:
    branches: [main, master]
    paths:
      - "web/**"
      - "docker-compose.yml"
      - ".github/workflows/deploy.yml"
      - "deploy/nginx/**"
  workflow_dispatch:

concurrency:
  group: deploy-docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GHCR namespace (lowercase)
        id: ghcr
        shell: bash
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.ghcr.outputs.owner }}/svo-site:latest
            ${{ env.REGISTRY }}/${{ steps.ghcr.outputs.owner }}/svo-site:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # При ошибке pull (403) для приватного GHCR добавьте PAT с read:packages в секрет GHCR_READ_TOKEN
      # и замените строку login на: echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u USER --password-stdin
      - name: Verify VPS secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          missing=
          [ -z "$VPS_HOST" ] && missing="${missing} VPS_HOST"
          [ -z "$VPS_USER" ] && missing="${missing} VPS_USER"
          [ -z "$VPS_SSH_KEY" ] && missing="${missing} VPS_SSH_KEY"
          [ -z "$VPS_APP_DIR" ] && missing="${missing} VPS_APP_DIR"
          if [ -n "$missing" ]; then
            echo "::error::В GitHub → Settings → Secrets → Actions задайте секреты (пустые сейчас):$missing"
            exit 1
          fi

      # Не используйте script_stop — в appleboy/ssh-action@v1.2.x этого input нет (warning + игнор).
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            set -euo pipefail
            APP_DIR=$(printf '%s' "${{ secrets.VPS_APP_DIR }}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            if [ -z "$APP_DIR" ]; then
              echo "::error::VPS_APP_DIR пустой в секретах GitHub"
              exit 1
            fi
            if [ ! -d "$APP_DIR" ]; then
              echo "=== Диагностика: каталог деплоя недоступен ==="
              echo "Пользователь SSH: $(whoami) uid=$(id -u)"
              parent="$(dirname "$APP_DIR")"
              echo "ls родителя ($parent):"
              ls -la "$parent" 2>&1 || true
              echo "ls целевого пути:"
              ls -la "$APP_DIR" 2>&1 || true
              echo "::error::Нет каталога VPS_APP_DIR или нет прав x на путь. На VPS один раз: git clone + sudo bash deploy/scripts/setup-var-www-svorazbor.sh, затем sudo chown -R ВАШ_SSH_USER:ВАШ_SSH_USER /var/www/svorazbor (кроме data — см. README). Секрет VPS_APP_DIR = тот же абсолютный путь, без пробелов и без / в конце."
              exit 1
            fi
            cd "$APP_DIR"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
