# Build & push image to GHCR, then pull + up on VPS (Docker Compose).
# Secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_APP_DIR; optional VPS_PORT (default 22).
# См. web/README.md — раздел «Деплой в production: Docker…»

name: Deploy (Docker → GHCR → VPS)

on:
  push:
    branches: [main, master]
    paths:
      - "web/**"
      - "docker-compose.yml"
      - ".github/workflows/deploy.yml"
      - "deploy/nginx/**"
  workflow_dispatch:

concurrency:
  group: deploy-docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GHCR namespace (lowercase)
        id: ghcr
        shell: bash
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.ghcr.outputs.owner }}/svo-site:latest
            ${{ env.REGISTRY }}/${{ steps.ghcr.outputs.owner }}/svo-site:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # При ошибке pull (403) для приватного GHCR добавьте PAT с read:packages в секрет GHCR_READ_TOKEN
      # и замените строку login на: echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u USER --password-stdin
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_APP_DIR }}"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
