# Build & push image to GHCR, then pull + up on VPS (Docker Compose).
# Secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY; optional VPS_PORT (default 22).
# Путь деплоя: Variables → VPS_APP_DIR = /var/www/svorazbor (рекомендуется, видно в логах).
#   Либо Secret VPS_APP_DIR — тот же путь, но GitHub маскирует его в логах как ***.
# См. web/README.md — раздел «Деплой в production: Docker…»

name: Deploy (Docker → GHCR → VPS)

on:
  push:
    branches: [main, master]
    paths:
      - "web/**"
      - "docker-compose.yml"
      - ".github/workflows/deploy.yml"
      - "deploy/nginx/**"
  workflow_dispatch:

concurrency:
  group: deploy-docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GHCR namespace (lowercase)
        id: ghcr
        shell: bash
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.ghcr.outputs.owner }}/svo-site:latest
            ${{ env.REGISTRY }}/${{ steps.ghcr.outputs.owner }}/svo-site:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # При ошибке pull (403) для приватного GHCR добавьте PAT с read:packages в секрет GHCR_READ_TOKEN
      # и замените строку login на: echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u USER --password-stdin
      - name: Verify VPS secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_APP_DIR: ${{ vars.VPS_APP_DIR || secrets.VPS_APP_DIR }}
        run: |
          missing=
          [ -z "$VPS_HOST" ] && missing="${missing} VPS_HOST"
          [ -z "$VPS_USER" ] && missing="${missing} VPS_USER"
          [ -z "$VPS_SSH_KEY" ] && missing="${missing} VPS_SSH_KEY"
          [ -z "$VPS_APP_DIR" ] && missing="${missing} VPS_APP_DIR"
          if [ -n "$missing" ]; then
            echo "::error::Задайте Secrets/Variables (пусто сейчас):$missing"
            echo "Путь деплоя лучше задать как Repository variable VPS_APP_DIR=/var/www/svorazbor — тогда логи не маскируют путь."
            exit 1
          fi

      # Не используйте script_stop — в appleboy/ssh-action@v1.2.x этого input нет (warning + игнор).
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            set -euo pipefail
            APP_DIR=$(printf '%s' "${{ vars.VPS_APP_DIR || secrets.VPS_APP_DIR }}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            if [ -z "$APP_DIR" ]; then
              echo "::error::VPS_APP_DIR пустой: задайте Variable или Secret VPS_APP_DIR"
              exit 1
            fi
            if [ ! -d "$APP_DIR" ]; then
              echo "=== Диагностика: каталог деплоя недоступен ==="
              echo "Ожидаемый путь (проверьте на VPS): $APP_DIR"
              echo "SSH-пользователь: $(whoami) uid=$(id -u)"
              parent="$(dirname "$APP_DIR")"
              if [ -d "$parent" ]; then
                echo "Содержимое $parent:"
                ls -la "$parent"
              else
                echo "Родительский каталог не существует: $parent"
                echo "Выполните: sudo mkdir -p \"$APP_DIR\""
              fi
              if [ -e "$APP_DIR" ]; then
                echo "Путь существует, но это не каталог или нет прав входа — проверьте chmod/chown."
                ls -ld "$APP_DIR" 2>&1 || true
              else
                echo "Каталог отсутствует — на VPS: git clone + sudo bash deploy/scripts/setup-var-www-svorazbor.sh"
              fi
              echo "::error::Создайте каталог и docker-compose + .env (см. web/README «Первый раз на VPS»). В GitHub: Settings → Variables → VPS_APP_DIR = /var/www/svorazbor (Variable, не Secret — путь будет виден в логах)."
              exit 1
            fi
            cd "$APP_DIR"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
