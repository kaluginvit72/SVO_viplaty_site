services:
  app:
    image: ghcr.io/${GHCR_IMAGE_OWNER}/svo-site:latest
    container_name: svo-site
    restart: always
    env_file: .env
    # 3001 на хосте: порт 3000 часто занят другим Node/старым контейнером
    ports:
      - "127.0.0.1:3001:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.svorazbor-web.rule=Host(`svorazbor.ru`) || Host(`www.svorazbor.ru`)"
      - "traefik.http.routers.svorazbor-web.entrypoints=web"
      - "traefik.http.routers.svorazbor-web.middlewares=redirect-to-https@file"
      - "traefik.http.routers.svorazbor-websecure.rule=Host(`svorazbor.ru`) || Host(`www.svorazbor.ru`)"
      - "traefik.http.routers.svorazbor-websecure.entrypoints=websecure"
      - "traefik.http.routers.svorazbor-websecure.tls=true"
      - "traefik.http.routers.svorazbor-websecure.tls.certresolver=letsencrypt"
      - "traefik.http.services.svorazbor.loadbalancer.server.port=3000"
      - "traefik.http.services.svorazbor.loadbalancer.healthcheck.path=/api/health"
      - "traefik.http.services.svorazbor.loadbalancer.healthcheck.interval=30s"
      - "traefik.http.services.svorazbor.loadbalancer.healthcheck.timeout=10s"
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - dokploy-network
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

networks:
  dokploy-network:
    external: true