# Production template for VPS. Copy this file + `.env` into VPS_APP_DIR (см. web/README.md — деплой Docker).
# Image is built in GitHub Actions and pushed to GHCR. Set GHCR_IMAGE_OWNER in `.env` (lowercase GitHub username or org).

services:
  app:
    image: ghcr.io/${GHCR_IMAGE_OWNER}/svo-site:latest
    container_name: svo-site
    restart: always
    env_file: .env
    # 3001 на хосте: порт 3000 часто занят другим Node/старым контейнером
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
