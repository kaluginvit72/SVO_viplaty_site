# Альтернативный шаблон (другой хост). Production RC: deploy/nginx/svorazbor.ru.conf
# Nginx reverse proxy for Next.js (Docker on 127.0.0.1:3000).
# Domain: svo.kalugin-consultig.ru
#
# Install: copy to /etc/nginx/sites-available/, symlink sites-enabled, nginx -t && systemctl reload nginx.
# TLS: certbot --nginx -d svo.kalugin-consultig.ru (adds SSL server block; keep proxy_* headers).

upstream svo_next {
  server 127.0.0.1:3000;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name svo.kalugin-consultig.ru;

  client_max_body_size 16m;

  location / {
    proxy_pass http://svo_next;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_buffering off;
    proxy_read_timeout 86400;
  }
}
