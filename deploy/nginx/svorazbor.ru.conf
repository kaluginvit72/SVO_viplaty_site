# Nginx reverse proxy for Next.js (Docker: хост 127.0.0.1:3001 → контейнер :3000).
# Production domain: https://svorazbor.ru
#
# Install: copy to /etc/nginx/sites-available/svorazbor.ru.conf, symlink sites-enabled, nginx -t && systemctl reload nginx.
# TLS: sudo certbot --nginx -d svorazbor.ru -d www.svorazbor.ru
# (если www не нужен — уберите -d www… и строку www из server_name ниже)

upstream svo_next {
  server 127.0.0.1:3001;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name svorazbor.ru www.svorazbor.ru;

  client_max_body_size 16m;

  location / {
    proxy_pass http://svo_next;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_buffering off;
    proxy_read_timeout 86400;
  }
}
